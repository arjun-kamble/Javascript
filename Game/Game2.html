<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissor</title>
  <link rel="stylesheet" href="Game2.css">
</head>
<body>
  <h1>Rock Paper Scissor </h1>
  <div class="select_one">
    <div class="photo">
      <img src="rock.png" alt="Rock" id="rock" width="100" height="100">
    </div>

    <div class="photo">
      <img src="paper.png" alt="Paper" id="paper" width="100" height="100">
    </div>

    <div class="photo">
      <img src="scissors.png" alt="Scissor" id="scissor" width="100" height="100"> 
  </div>
</div>
  <div class="score">
    <div class="you">
       <div id="user_score">0</div>
       <h2>You</h2>
    </div>

    <div class="compter">
      <div id="compter_score">0</div>
      <h2> Comp</h2>
    </div>
    </div>
    <div class="msg">
    <div class="end">
    <h2>Play Your Move</h2>
      </div>
</div>
<script src="Game2.js"></script>
</body>
</html>
