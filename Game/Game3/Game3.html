<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="Game3.css">
</head>
<body>
  <div class="calculator">
    <input type="text" placeholder="0" id="inputBox">
    <div>
      <button class="unique">AC</button>
      <button class="unique">DEL</button>
      <button class="unique">%</button>
      <button class="unique">/</button>
      </div>
      <div>
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="unique">*</button>
      </div>
      <div>
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="unique">-</button>
        </div>
        <div>
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="unique">+</button>
       </div>
       <div>
        <button>00</button>
        <button>0</button>
        <button>.</button>
        <button id="unique2">=</button>
        </div>
  </div>
  <script src="Game3.js"></script>
</body>
</html>
